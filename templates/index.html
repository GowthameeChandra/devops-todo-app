<!DOCTYPE html>
<html>
<head>
    <title>Todo App</title>
</head>
<body>
    <h1>My Todo List</h1>

    <form method="POST">
        <input type="text" name="task" placeholder="Enter task">
        <button>Add</button>
    </form>

    <ul>
        {% for task in tasks %}
        <li>
            {{task}}
            <a href="/delete/{{loop.index0}}">Delete</a>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
